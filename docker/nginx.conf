# Peptide Visual Lab - Nginx Configuration
# Serves React SPA and proxies API requests to backend
#
# Two root-cause fixes baked in 2026-05-12 (after the deploy-day incident):
#   1) Docker DNS re-resolution for the backend upstream — without this,
#      every backend restart that lands a new container IP makes nginx
#      return 502 ("Connection refused: 172.18.0.4") forever because the
#      worker cached the IP at startup. Fix: 127.0.0.11 is Docker's
#      embedded DNS; valid=10s makes nginx re-resolve every 10 seconds.
#   2) Cache-Control on index.html — Vite emits content-hashed chunk
#      filenames (e.g. DatabaseSearch-B4xKaaFo.js). After a deploy, the
#      hashes change. If the browser has the OLD index.html cached, it
#      tries to load the OLD chunk filenames which 404 → "Failed to fetch
#      dynamically imported module" page crash. Fix: never cache the
#      HTML entry-points; the hashed assets stay immutable as before.

# Docker embedded DNS resolver — needed by the backend upstream block below.
# Must be in the http{} context per nginx semantics; declared here at server
# scope works inside container.

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS for upstream re-resolution (see Fix #1 comment above).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Upload size limit (default is 1MB — too small for datasets)
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_comp_level 4;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml application/wasm;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # API proxy - forward to backend service.
    # Using a variable for the upstream forces nginx to re-resolve via the
    # resolver declared above on every request (fix #1) instead of caching
    # the IP at worker startup. Per-request DNS hit is ~µs locally.
    location /api/ {
        set $backend_upstream "http://backend:8000";
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings for long-running predictions (TANGO can take minutes)
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # Disable request buffering for large CSV/FASTA uploads
        proxy_request_buffering off;

        # Large response bodies (batch results can be several MB)
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;

        # WebSocket support (if needed in future)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Hashed assets — Vite content-hashes the filename, so cache forever
    # is correct. New deploys ship new filenames, never overwrite old ones.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Vite emits service-worker / favicon / robots etc. at root — small,
    # cache for an hour so deploys don't surprise users but reloads still
    # pick up changes within the hour.
    location ~* \.(?:ico|png|svg|webmanifest|xml|txt)$ {
        expires 1h;
        add_header Cache-Control "public" always;
    }

    # Health check endpoint (matches what docker compose healthcheck hits)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback — serve index.html for any non-asset route so client-
    # side React Router can take over. CRITICAL: index.html must NEVER be
    # cached (fix #2 above) or post-deploy users get stale chunk hashes
    # and "Failed to fetch dynamically imported module" errors.
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ /index.html;
    }
}
